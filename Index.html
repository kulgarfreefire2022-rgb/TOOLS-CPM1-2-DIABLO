<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
    <title>TOOLS CLAN DIABLO CPR.XXX</title>
    <style>
        /* CSS tetap sama sesuai permintaanmu */
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000 url('image.png') no-repeat center center fixed; background-size: cover; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px); padding: 25px; border-radius: 15px; box-shadow: 0 0 30px rgba(160, 32, 240, 0.6); border: 2px solid #a020f0; text-align: center; width: 90%; max-width: 360px; }
        h1 { font-size: 22px; margin-bottom: 15px; color: #e0aaff; text-shadow: 0 0 10px #a020f0; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #a020f0; background: rgba(255, 255, 255, 0.05); color: #fff; font-size: 14px; box-sizing: border-box; }
        /* Highlight khusus untuk input Key agar beda */
        #accessKey { border: 1px solid #ff8800; } 
        button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 0; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; }
        button.login { background: #a020f0; color: #fff; }
        button.login:hover { background: #7b1fa2; transform: scale(1.02); }
        button.menu { background: #ff8800; color: #fff; margin-bottom: 15px; }
        .status { margin-top: 15px; font-size: 14px; min-height: 20px; font-weight: bold; }
        .error { color: #ff5555; }
        .success { color: #00ff00; }
        .price { font-size: 12px; opacity: 0.9; margin-bottom: 4px; color: #e0aaff; text-align: left; padding-left: 5px; }
        .small { font-size: 11px; opacity: 0.6; margin-top: 20px; display: block; }
    </style>

</head>
<body>

<div class="container">
    <h1>CPM WEB TOOL - Diablo CPR.XXX</h1>
    
    <div id="loginSection">
        <select id="gameSelect">
            <option value="">-- Pilih Game --</option>
            <option value="1">Car Parking Multiplayer 1</option>
            <option value="2">Car Parking Multiplayer 2</option>
        </select>
        <input id="email" type="email" placeholder="Email Akun CPM">
        <input id="password" type="password" placeholder="Password Akun">
        
        <input id="accessKey" type="text" placeholder="Masukkan Access Key (Kunci)">
        
        <button class="login" id="loginBtn">LOGIN</button>
        <div id="status" class="status"></div>
    </div>

    <div id="menuButtons" style="display:none">
        <div class="price">👑 Fitur Rank </div>
        <button class="menu" onclick="kingRank()">👑 KING RANK</button>
        
        <div class="price">📧 Pengaturan Akun </div>
        <button class="menu" style="background:#444" onclick="changeEmail()">📧 GANTI EMAIL</button>
        <button class="menu" style="background:#444" onclick="changePassword()">🔐 GANTI PASSWORD</button>
        
        <div id="serviceStatus" class="status"></div>
    </div>

    <footer class="small">Developer @AWIMEDAN-GARAGE © 2026</footer>
</div>
